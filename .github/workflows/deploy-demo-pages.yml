name: 🚀 Deploy demo (GitHub Pages)

# Deploys the in-browser demo (FakeRest, in-memory data) to this
# repository's own GitHub Pages site using the native Pages deployment
# (no gh-pages branch, no deploy token, no external repository).
on:
    push:
        branches:
            - main
    workflow_dispatch:

# Allow only one concurrent deployment; do not cancel an in-progress run.
concurrency:
    group: pages
    cancel-in-progress: false

# Permissions required by the native GitHub Pages deployment.
permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    deploy:
        name: 🔨 Build & 🚀 Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 10

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: 📥 Install dependencies
              run: npm ci

            - name: 🔨 Build demo
              run: npm run build:demo
              env:
                  NODE_ENV: CI

            - name: ⚙️ Configure Pages
              uses: actions/configure-pages@v5

            - name: 📤 Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

            - name: 🚀 Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
